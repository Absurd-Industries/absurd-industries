<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absurd Industries - Maker OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'radium': '#FF6B35',
                        'laboratory': '#2A5F41',
                        'uranium': '#8B9A46',
                        'polonium': '#D4A574',
                        'surface': '#1a1a1a',
                        'surface-light': '#2a2a2a',
                        'surface-lighter': '#3a3a3a',
                        'border': '#404040',
                        'text': '#ffffff',
                        'text-dim': '#cccccc',
                        'text-dark': '#999999'
                    },
                    fontFamily: {
                        'mono': ['JetBrains Mono', 'Courier New', 'monospace'],
                        'sans': ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-text font-sans overflow-hidden select-none">
    
    <div id="desktop" class="h-screen flex flex-col">
        
        <!-- Desktop Grid -->
        <div class="flex-1 relative grid-pattern">
            
            <!-- Left Dock -->
            <div class="absolute left-4 top-4 bottom-16 w-16 bg-surface-light border border-border flex flex-col items-center py-4 gap-3">
                <div @click="openApp('profile')" class="dock-item group" data-tooltip="Profile">
                    <i class="fas fa-user text-radium"></i>
                </div>
                <div @click="openApp('lab')" class="dock-item group" data-tooltip="Laboratory">
                    <i class="fas fa-flask text-uranium"></i>
                </div>
                <div @click="openApp('tools')" class="dock-item group" data-tooltip="Equipment">
                    <i class="fas fa-wrench text-laboratory"></i>
                </div>
                <div @click="openApp('journal')" class="dock-item group" data-tooltip="Journal">
                    <i class="fas fa-file-lines text-polonium"></i>
                </div>
                <div @click="openApp('trade')" class="dock-item group" data-tooltip="Trade">
                    <i class="fas fa-coins text-radium"></i>
                </div>
                <div @click="openApp('network')" class="dock-item group" data-tooltip="Network">
                    <i class="fas fa-network-wired text-text-dim"></i>
                </div>
                
                <div class="flex-1"></div>
                
                <div @click="toggleSystem" class="dock-item group" data-tooltip="System">
                    <i class="fas fa-cog text-text-dim"></i>
                </div>
            </div>
            
            <!-- Status Widgets -->
            <div class="absolute right-4 top-4 space-y-3">
                <!-- Live Lab Status -->
                <div class="status-widget">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm font-mono uppercase tracking-wider">LAB_STATUS</span>
                        <div class="w-2 h-2 bg-uranium animate-pulse"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs font-mono">
                        <div>TEMP: {{ labStats.temp }}°C</div>
                        <div>RAD: {{ labStats.radiation }}</div>
                        <div>EXP: {{ labStats.experiment }}d</div>
                        <div>YIELD: {{ labStats.yield }}%</div>
                    </div>
                </div>
                
                <!-- Quick Actions -->
                <div class="status-widget">
                    <div class="text-sm font-mono uppercase tracking-wider mb-2">ACTIONS</div>
                    <div class="grid grid-cols-2 gap-1">
                        <button @click="quickAction('experiment')" class="action-btn">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button @click="quickAction('log')" class="action-btn">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button @click="quickAction('sell')" class="action-btn">
                            <i class="fas fa-tag"></i>
                        </button>
                        <button @click="quickAction('connect')" class="action-btn">
                            <i class="fas fa-handshake"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Windows Container -->
            <div class="absolute inset-0 pointer-events-none">
                <div class="relative w-full h-full pointer-events-auto">
                    
                    <!-- Profile Window -->
                    <window-component v-if="windows.profile.open"
                        :window-data="windows.profile"
                        @close="closeApp('profile')"
                        @minimize="minimizeApp('profile')"
                        @drag="dragWindow"
                        @focus="focusWindow('profile')">
                        <template #header>
                            <i class="fas fa-user text-radium mr-2"></i>
                            <span class="font-mono uppercase tracking-wider">MARIE_CURIE.profile</span>
                        </template>
                        <template #content>
                            <div class="p-4 h-full overflow-y-auto">
                                <div class="flex gap-4 mb-6">
                                    <div class="w-20 h-20 bg-surface-light border border-border overflow-hidden">
                                        <img src="https://cdn.britannica.com/12/12512-004-80322EC3/Marie-Curie.jpg" 
                                             class="w-full h-full object-cover" alt="Marie Curie">
                                    </div>
                                    <div class="flex-1">
                                        <h2 class="text-xl font-mono uppercase tracking-wider text-radium mb-1">MARIE CURIE</h2>
                                        <p class="text-text-dim text-sm font-mono">RADIOACTIVITY_RESEARCHER</p>
                                        <p class="text-text-dark text-xs font-mono mt-1">MEMBER_SINCE: 1895.09</p>
                                        
                                        <div class="grid grid-cols-3 gap-4 mt-4 text-center">
                                            <div>
                                                <div class="text-lg font-mono text-radium">127</div>
                                                <div class="text-xs font-mono text-text-dim">POSTS</div>
                                            </div>
                                            <div>
                                                <div class="text-lg font-mono text-uranium">73</div>
                                                <div class="text-xs font-mono text-text-dim">PROJECTS</div>
                                            </div>
                                            <div>
                                                <div class="text-lg font-mono text-laboratory">721</div>
                                                <div class="text-xs font-mono text-text-dim">TOOLS</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="space-y-3">
                                    <div class="text-sm font-mono uppercase tracking-wider text-text-dim border-b border-border pb-1">
                                        RECENT_ACTIVITY
                                    </div>
                                    <div v-for="activity in recentActivity" :key="activity.id" 
                                         class="bg-surface-light border border-border p-3">
                                        <div class="flex justify-between items-start">
                                            <p class="text-sm font-mono text-text">{{ activity.text }}</p>
                                            <span class="text-xs font-mono text-text-dark">{{ activity.time }}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </window-component>
                    
                    <!-- Laboratory Window -->
                    <window-component v-if="windows.lab.open"
                        :window-data="windows.lab"
                        @close="closeApp('lab')"
                        @minimize="minimizeApp('lab')"
                        @drag="dragWindow"
                        @focus="focusWindow('lab')">
                        <template #header>
                            <i class="fas fa-flask text-uranium mr-2"></i>
                            <span class="font-mono uppercase tracking-wider">LABORATORY.monitor</span>
                        </template>
                        <template #content>
                            <div class="p-4 h-full overflow-y-auto">
                                <div class="grid grid-cols-2 gap-4 mb-6">
                                    <div class="bg-surface-light border border-border p-4">
                                        <div class="text-sm font-mono uppercase tracking-wider text-text-dim mb-3">CURRENT_EXPERIMENT</div>
                                        <div class="text-sm font-mono text-text mb-2">RADIUM_EXTRACTION.exe</div>
                                        <div class="text-xs font-mono text-text-dim mb-3">DAY: {{ currentExperiment.day }}</div>
                                        <div class="w-full bg-surface h-2 border border-border">
                                            <div class="bg-radium h-full transition-all duration-1000" 
                                                 :style="`width: ${currentExperiment.progress}%`"></div>
                                        </div>
                                        <div class="text-xs font-mono text-text-dim mt-1">{{ currentExperiment.progress }}% COMPLETE</div>
                                    </div>
                                    
                                    <div class="bg-surface-light border border-border p-4">
                                        <div class="text-sm font-mono uppercase tracking-wider text-text-dim mb-3">SAFETY_STATUS</div>
                                        <div class="space-y-2 text-xs font-mono">
                                            <div class="flex justify-between">
                                                <span class="text-text-dim">RADIATION:</span>
                                                <span class="text-red-400">EXTREME</span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-text-dim">VENTILATION:</span>
                                                <span class="text-yellow-400">MINIMAL</span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-text-dim">PROTECTION:</span>
                                                <span class="text-red-400">NONE</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="bg-surface border border-border p-4">
                                    <div class="text-sm font-mono uppercase tracking-wider text-text-dim mb-3">LIVE_CONSOLE</div>
                                    <div class="font-mono text-xs space-y-1">
                                        <div v-for="log in labLogs" :key="log.id" class="text-uranium">
                                            <span class="text-text-dark">{{ log.timestamp }}</span>
                                            <span class="ml-2">{{ log.message }}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </window-component>
                    
                    <!-- Other windows will be similar... -->
                </div>
            </div>
        </div>
        
        <!-- Bottom Status Bar -->
        <div class="h-12 bg-surface-light border-t border-border flex items-center justify-between px-4">
            <!-- Open Apps -->
            <div class="flex items-center gap-2">
                <div v-for="(window, key) in windows" :key="key"
                     v-if="window.open"
                     @click="focusWindow(key)"
                     class="taskbar-item"
                     :class="{ 'active': window.focused }">
                    <i :class="getAppIcon(key)" class="text-sm"></i>
                    <span class="text-xs font-mono uppercase">{{ window.title }}</span>
                </div>
            </div>
            
            <!-- System Info -->
            <div class="flex items-center gap-4 text-xs font-mono">
                <div class="flex items-center gap-1">
                    <i class="fas fa-wifi text-uranium"></i>
                    <span class="text-text-dim">ONLINE</span>
                </div>
                <div class="flex items-center gap-1">
                    <i class="fas fa-radiation text-radium animate-pulse"></i>
                    <span class="text-text-dim">LAB_ACTIVE</span>
                </div>
                <div class="text-text-dim">{{ currentTime }}</div>
            </div>
        </div>
        
        <!-- Notifications -->
        <div class="fixed top-4 right-80 space-y-2 z-50">
            <div v-for="notification in notifications" :key="notification.id" 
                 class="notification">
                <div class="flex items-start justify-between">
                    <div class="flex items-start gap-3">
                        <i :class="notification.icon" :style="`color: ${notification.color}`"></i>
                        <div>
                            <div class="text-sm font-mono uppercase tracking-wider text-text">{{ notification.title }}</div>
                            <div class="text-xs font-mono text-text-dim">{{ notification.message }}</div>
                        </div>
                    </div>
                    <button @click="dismissNotification(notification.id)" 
                            class="text-text-dark hover:text-text">
                        <i class="fas fa-times text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Vue Components -->
    <script src="components.js"></script>
    <!-- Main Application Logic -->
    <script src="script.js"></script>
</body>
</html>
